workflows:
  android-workflow:
    name: BDP2P Android APK Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 21
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Clean and Build web project
        script: |
          npm run clean
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android App (Debug APK)
        script: |
          cd android
          ls -l gradlew
          chmod +x gradlew
          ls -l gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - Rifatttc2016@gmail.com
        notify:
          success: true
          failure: true
