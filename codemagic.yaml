workflows:
  android-workflow:
    name: BDP2P Android APK Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 21
    scripts:
      - name: Sync and Build
        script: |
          npm install
          npm run clean
          npm run build
          npx cap sync android
      - name: Build Android App (Debug APK)
        script: |
          cd android
          bash gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - Rifatttc2016@gmail.com
        notify:
          success: true
          failure: true
