workflows:
  android-workflow:
    name: BDP2P Android APK Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web project
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android App (Release APK)
        script: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - Rifatttc2016@gmail.com
        notify:
          success: true
          failure: true
