# codemagic.yaml এ পরিবর্তন করুন:
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Clean and Build web project
        script: |
          npm run clean  # নতুন যোগ করুন
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android App (Debug APK)
        script: |
          cd android
          ./gradlew assembleDebug # যদি আগের gradle অস্পষ্ট কমান্ড থাকে, এটি ব্যবহার করা ভালো
